name: Gaming4Free 续期 (+90 MIN)

on:
  workflow_dispatch:
    inputs:
      enable_recording:
        description: '是否录屏'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb ffmpeg curl unzip \
            fonts-noto-cjk \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 || sudo apt-get install -y -qq libasound2

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt
          python -c "from cloakbrowser import ensure_binary; ensure_binary()"

      - name: 运行续期脚本
        env:
          G4F_URL:      ${{ secrets.G4F_URL }}
          APP_TOKEN:    ${{ secrets.APP_TOKEN }}
          WX_PUSHER_UID: ${{ secrets.WX_PUSHER_UID }}
          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          ENABLE_RECORDING: ${{ github.event.inputs.enable_recording || 'false' }}
        run: |
          Xvfb :99 -screen 0 1280x800x24 +extension RANDR &
          XVFB_PID=$!
          sleep 2

          RECORD_PID=""
          if [ "$ENABLE_RECORDING" = "true" ]; then
            echo "🎬 录屏已开启"
            ffmpeg -f x11grab -video_size 1280x800 -framerate 15 -i :99 \
              -codec:v libx264 -preset ultrafast -crf 28 \
              -pix_fmt yuv420p -movflags +faststart /tmp/recording.mp4 \
              > /tmp/ffmpeg.log 2>&1 &
            RECORD_PID=$!
            sleep 3
          fi

          timeout 240 python renew.py || echo "脚本退出码: $?"

          echo "=== 截图 ==="
          ls -la ./screenshots/ || echo "无截图"

          if [ -n "$RECORD_PID" ]; then
            sleep 2
            kill $RECORD_PID 2>/dev/null || true
            wait $RECORD_PID 2>/dev/null || true
          fi

          kill $XVFB_PID 2>/dev/null || true

      - name: 上传截图和录屏
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files-${{ github.run_number }}
          path: |
            ./screenshots/*.png
            /tmp/recording.mp4
            /tmp/ffmpeg.log
          if-no-files-found: ignore
          retention-days: 3

      - name: 清理旧 workflow runs（保留最近 2 个）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW_ID="${{ github.workflow }}"
          RUN_IDS=$(gh run list \
            --repo "$REPO" \
            --workflow "$WORKFLOW_ID" \
            --limit 100 \
            --json databaseId \
            --jq '.[].databaseId')
          SKIP=2
          COUNT=0
          for RUN_ID in $RUN_IDS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -le $SKIP ]; then
              echo "保留 run #$RUN_ID"
            else
              echo "删除 run #$RUN_ID"
              gh run delete "$RUN_ID" --repo "$REPO" || true
            fi
          done
